name: customer_app
description: "Courier MVP - Customer App"
publish_to: 'none'

version: 1.0.5+7

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase - Latest versions (matching driver app)
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^17.2.3

  # Google APIs
  google_places_flutter: ^2.1.1
  http: ^1.2.2

  # Design System - Glassmorphism
  glassmorphism: ^3.0.0

  # State Management & Dependency Injection
  get: ^4.6.6

  # UI/UX
  flutter_animate: ^4.5.2
  intl: ^0.20.2

  # Utilities
  uuid: ^4.5.2
  
  # Phone Number
  intl_phone_field: ^3.2.0
  
  # URL Launcher for phone calls
  url_launcher: ^6.3.1

  # In-app web view for supplies shopping
  webview_flutter: ^4.10.0

  # SVG logo support
  flutter_svg: ^2.1.0

  # Cached network images (for Firebase-hosted carousel banners)
  cached_network_image: ^3.4.1

  # Persist normal delivery order number counter (0001, 0002, ...)
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/order_supplies/
    - assets/images/banner/

  # To add custom fonts to your application, uncomment the following lines:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic